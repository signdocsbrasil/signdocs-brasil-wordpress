name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint:
    name: PHPCS (WordPress coding standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none
      - name: Install deps
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPCS
        run: composer phpcs -- --report=summary

  static:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer phpstan

  unit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer test
