name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint:
    # PHPCS is advisory: WordPress-Extra is an extremely strict style
    # ruleset and we're shipping a v1.x product; we treat PHPCS findings
    # as technical debt that gets paid down over time rather than a
    # merge gate. PHPUnit + PHPStan are the merge gates.
    name: PHPCS (WordPress coding standards — advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none
      - name: Install deps
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPCS
        run: composer phpcs -- --report=summary || true

  static:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer phpstan

  unit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer test
